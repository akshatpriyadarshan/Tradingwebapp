# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────────────────────
# TradingGenie AI — Secrets Configuration
#
# LOCAL:  Save this file as  .streamlit/secrets.toml  (never commit to git)
# CLOUD:  Streamlit Cloud → App Settings → Secrets → paste contents below
# ─────────────────────────────────────────────────────────────────────────────

# ── Twilio SMS OTP (optional — remove section if not using) ──────────────────
# Sign up free at https://www.twilio.com
# Free tier gives $15 credit (~1000 SMS)
[twilio]
account_sid  = "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
auth_token   = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
from_number  = "+1xxxxxxxxxx"

# ── Gmail SMTP Email OTP (optional — remove section if not using) ─────────────
# Use a dedicated Gmail account for your app
# Generate App Password: Google Account → Security → 2FA → App Passwords
[smtp]
host     = "smtp.gmail.com"
port     = 587
user     = "yourapp@gmail.com"
password = "xxxx xxxx xxxx xxxx"
